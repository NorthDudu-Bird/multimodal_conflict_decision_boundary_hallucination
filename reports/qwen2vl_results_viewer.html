<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Qwen2-VL Results Viewer</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #ddd6c8;
      --faithful: #0f766e;
      --hallucination: #b42318;
      --ambiguous: #a16207;
      --manual: #475467;
      --level: #1d4ed8;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(180, 35, 24, 0.08), transparent 24%),
        var(--bg);
      color: var(--ink);
    }
    .page { max-width: 1600px; margin: 0 auto; padding: 28px 24px 48px; }
    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(250,245,236,0.95));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.7; }
    .subtle { color: var(--muted); font-size: 14px; line-height: 1.7; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 18px; }
    .stat { background: rgba(255,255,255,0.82); border: 1px solid var(--line); border-radius: 18px; padding: 14px 16px; }
    .stat .k { color: var(--muted); font-size: 13px; margin-bottom: 6px; }
    .stat .v { font-size: 15px; line-height: 1.6; word-break: break-word; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      padding: 14px 16px;
      margin-bottom: 18px;
      background: rgba(244, 241, 234, 0.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 18px;
    }
    .toolbar label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; color: var(--muted); }
    .toolbar select, .toolbar input[type="text"], .toolbar input[type="file"], .toolbar button {
      min-width: 150px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      font-size: 14px;
    }
    .toolbar button { cursor: pointer; font-weight: 700; }
    .toolbar .grow { flex: 1 1 280px; }
    .toolbar .count { margin-left: auto; font-size: 14px; color: var(--muted); }
    .groups { display: flex; flex-direction: column; gap: 18px; }
    .group-card { background: var(--panel); border-radius: 22px; border: 1px solid var(--line); box-shadow: var(--shadow); overflow: hidden; }
    .group-top { display: grid; grid-template-columns: 320px 1fr; gap: 18px; padding: 18px; border-bottom: 1px solid var(--line); }
    .thumb-wrap { background: #e5e7eb; border-radius: 18px; overflow: hidden; min-height: 220px; display: flex; align-items: center; justify-content: center; }
    .thumb { width: 100%; height: 260px; object-fit: cover; display: block; }
    .thumb-missing { color: var(--muted); font-size: 14px; padding: 16px; text-align: center; }
    .group-meta { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
    .group-title { font-size: 22px; font-weight: 700; }
    .meta-line { color: var(--muted); line-height: 1.7; word-break: break-word; }
    .records-wrap { display: flex; flex-direction: column; gap: 14px; padding: 18px; }
    .record { border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,0.82); padding: 14px; }
    .record-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
    .record-left { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .record-right { color: var(--muted); font-size: 13px; }
    .sample-id { font-size: 13px; color: var(--muted); }
    .badge {
      display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.02em; background: #f3f4f6; color: #111827;
    }
    .badge.faithful { background: rgba(15, 118, 110, 0.14); color: var(--faithful); }
    .badge.hallucination { background: rgba(180, 35, 24, 0.12); color: var(--hallucination); }
    .badge.ambiguous { background: rgba(161, 98, 7, 0.14); color: var(--ambiguous); }
    .badge.manual { background: rgba(71, 84, 103, 0.14); color: var(--manual); }
    .badge.level { background: rgba(29, 78, 216, 0.12); color: var(--level); }
    .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .block { border: 1px solid var(--line); border-radius: 14px; padding: 12px; background: rgba(255,255,255,0.86); line-height: 1.7; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .prompt { background: rgba(29, 78, 216, 0.05); }
    .output { background: rgba(15, 118, 110, 0.05); }
    .notes { background: rgba(71, 84, 103, 0.05); }
    .hidden { display: none !important; }
    .status { margin-top: 12px; padding: 12px 14px; border: 1px dashed var(--line); border-radius: 14px; background: rgba(255,255,255,0.72); color: var(--muted); }
    code { background: rgba(31,41,51,0.06); padding: 2px 5px; border-radius: 6px; }
    @media (max-width: 920px) {
      .group-top { grid-template-columns: 1fr; }
      .record-grid { grid-template-columns: 1fr; }
      .thumb { height: 220px; }
    }
    @media (max-width: 720px) {
      .page { padding: 18px 12px 28px; }
      .hero { padding: 20px; border-radius: 18px; }
      h1 { font-size: 26px; }
      .toolbar .count { width: 100%; margin-left: 0; }
      .record-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Qwen2-VL Results Viewer</h1>
      <p class="subtitle">用于预览 Qwen2-VL 结果 CSV。当前已适配 Stanford Cars 复核后的精简表，会根据 <code>sample_id</code> 自动解析图片分组和 S0-S7 prompt。</p>
      <p class="subtle">推荐直接加载 <code>qwen2vl7b_stanford_clean_final_labeled_reviewed.csv</code>。页面会显示图像、prompt、模型输出、复核后的 true color 与最终 label。</p>
      <div class="stats" id="stats"></div>
      <div class="status" id="statusBox">等待加载 CSV...</div>
    </section>

    <section class="toolbar">
      <label>预设 CSV
        <select id="presetSelect">
          <option value="../data/metadata/outputs_labeled/qwen2vl7b_stanford_clean_final_labeled_reviewed.csv">stanford clean reviewed</option>
          <option value="../data/metadata/outputs_labeled/qwen2vl7b_stanford_clean_final_labeled.csv">stanford clean original final labeled</option>
          <option value="../data/metadata/outputs_labeled/qwen2vl7b_baseline_final_labeled.csv">baseline final labeled</option>
          <option value="../data/metadata/outputs_labeled/qwen2vl7b_baseline_prelabeled.csv">baseline prelabeled</option>
          <option value="../data/metadata/outputs_raw/qwen2vl7b_baseline_raw.csv">baseline raw</option>
          <option value="../data/metadata/outputs_labeled/qwen2vl7b_stress_final_labeled.csv">stress final labeled</option>
          <option value="../data/metadata/outputs_labeled/qwen2vl7b_stress_prelabeled.csv">stress prelabeled</option>
          <option value="../data/metadata/outputs_raw/qwen2vl7b_stress_raw.csv">stress raw</option>
        </select>
      </label>
      <button id="loadPresetBtn">加载预设</button>
      <label class="grow">自定义 CSV 路径
        <input id="pathInput" type="text" value="../data/metadata/outputs_labeled/qwen2vl7b_stanford_clean_final_labeled_reviewed.csv">
      </label>
      <button id="loadPathBtn">按路径加载</button>
      <label>本地 CSV 文件
        <input id="fileInput" type="file" accept=".csv,text/csv">
      </label>
      <label>Prompt
        <select id="levelFilter"><option value="all">全部</option></select>
      </label>
      <label>Label
        <select id="labelFilter"><option value="all">全部</option></select>
      </label>
      <label>True Color
        <select id="colorFilter"><option value="all">全部</option></select>
      </label>
      <div class="count" id="visibleCount"></div>
    </section>

    <section class="groups" id="groups"></section>
  </div>

  <script>
    const levelFilter = document.getElementById('levelFilter');
    const labelFilter = document.getElementById('labelFilter');
    const colorFilter = document.getElementById('colorFilter');
    const groupsEl = document.getElementById('groups');
    const visibleCount = document.getElementById('visibleCount');
    const statsEl = document.getElementById('stats');
    const statusBox = document.getElementById('statusBox');
    const presetSelect = document.getElementById('presetSelect');
    const pathInput = document.getElementById('pathInput');
    const fileInput = document.getElementById('fileInput');
    const loadPresetBtn = document.getElementById('loadPresetBtn');
    const loadPathBtn = document.getElementById('loadPathBtn');

    const LABEL_CLASS = {
      faithful: 'faithful',
      hallucination: 'hallucination',
      ambiguous: 'ambiguous',
      needs_manual_review: 'manual',
      unlabeled: 'manual',
    };

    const LEVEL_RANK = {
      S0: 0, S1: 1, S2: 2, S3: 3,
      ES1: 10, ES2: 11, ES3: 12, ES4: 13,
      1: 20, 2: 21, 3: 22, 4: 23,
    };

    let currentRows = [];

    function deriveImageId(row) {
      const explicit = String(row.image_id || row.file_name || '').trim();
      if (explicit) return explicit.replace(/\.[^.]+$/, '');
      const sampleId = String(row.sample_id || '').trim();
      const matched = sampleId.match(/^(.*)_S\d+$/);
      return matched ? matched[1] : (sampleId || 'unknown');
    }

    function derivePromptCode(row) {
      const explicit = String(row.prompt_code || '').trim();
      if (explicit) return explicit;
      const level = String(row.prompt_level || '').trim();
      if (/^\d+$/.test(level)) return `S${level}`;
      if (/^S\d+$/i.test(level)) return level.toUpperCase();
      const sampleId = String(row.sample_id || '').trim();
      const matched = sampleId.match(/_(S\d+)$/i);
      return matched ? matched[1].toUpperCase() : '';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let i = 0;
      let inQuotes = false;

      while (i < text.length) {
        const char = text[i];
        if (inQuotes) {
          if (char === '"') {
            if (text[i + 1] === '"') {
              field += '"';
              i += 1;
            } else {
              inQuotes = false;
            }
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(field);
            field = '';
          } else if (char === '\n') {
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else if (char === '\r') {
          } else {
            field += char;
          }
        }
        i += 1;
      }
      row.push(field);
      rows.push(row);

      if (rows.length === 0) return [];
      const header = rows[0].map((h) => h.replace(/^\ufeff/, ''));
      return rows.slice(1).filter(r => r.some(cell => String(cell).trim() !== '')).map((r) => {
        const obj = {};
        header.forEach((key, idx) => { obj[key] = r[idx] ?? ''; });
        return obj;
      });
    }

    function counter(rows, field, fallback='blank') {
      const map = new Map();
      rows.forEach((row) => {
        const key = String(row[field] || '').trim() || fallback;
        map.set(key, (map.get(key) || 0) + 1);
      });
      return Array.from(map.entries()).sort((a, b) => a[0].localeCompare(b[0], 'zh-CN'));
    }

    function labelBadge(label) {
      const normalized = String(label || '').trim() || 'unlabeled';
      const css = LABEL_CLASS[normalized] || 'manual';
      return `<span class="badge ${css}">${escapeHtml(normalized)}</span>`;
    }

    function buildImageSrc(imagePath) {
      const normalized = String(imagePath || '').replace(/\\/g, '/').replace(/^\.\//, '');
      if (!normalized) return '';
      if (/^[a-zA-Z]+:\//.test(normalized) || normalized.startsWith('file:') || normalized.startsWith('http')) {
        return normalized;
      }
      return normalized.startsWith('../') ? normalized : `../${normalized}`;
    }

    function sortRecords(a, b) {
      const aCode = derivePromptCode(a);
      const bCode = derivePromptCode(b);
      const aRank = LEVEL_RANK.hasOwnProperty(aCode) ? LEVEL_RANK[aCode] : 999;
      const bRank = LEVEL_RANK.hasOwnProperty(bCode) ? LEVEL_RANK[bCode] : 999;
      if (aRank !== bRank) return aRank - bRank;
      return String(a.sample_id || '').localeCompare(String(b.sample_id || ''), 'zh-CN');
    }

    function groupRows(rows) {
      const groups = new Map();
      rows.forEach((row) => {
        const key = deriveImageId(row);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });
      return Array.from(groups.entries())
        .map(([imageId, groupRows]) => {
          const records = [...groupRows].sort(sortRecords);
          return {
            image_id: imageId,
            image_path: records[0]?.image_path || '',
            true_color: records[0]?.true_color || '',
            conflict_color: records[0]?.conflict_color || '',
            review_confidence: records[0]?.review_confidence || '',
            records,
          };
        })
        .sort((a, b) => String(a.image_id).localeCompare(String(b.image_id), 'zh-CN', { numeric: true }));
    }

    function renderStats(rows, sourceLabel) {
      const groups = groupRows(rows);
      const labelSummary = counter(rows, 'label', 'unlabeled').map(([k, v]) => `${k}: ${v}`).join(' / ') || '-';
      const levelSummary = counter(rows.map((row) => ({ prompt_bucket: derivePromptCode(row) || 'unknown' })), 'prompt_bucket', 'unknown').map(([k, v]) => `${k}: ${v}`).join(' / ') || '-';
      const colorSummary = counter(rows, 'true_color', 'unknown').map(([k, v]) => `${k}: ${v}`).join(' / ') || '-';
      statsEl.innerHTML = `
        <div class="stat"><div class="k">数据源</div><div class="v">${escapeHtml(sourceLabel)}</div></div>
        <div class="stat"><div class="k">记录数</div><div class="v">${rows.length} 条</div></div>
        <div class="stat"><div class="k">图片组数</div><div class="v">${groups.length} 组</div></div>
        <div class="stat"><div class="k">Prompt 分布</div><div class="v">${escapeHtml(levelSummary)}</div></div>
        <div class="stat"><div class="k">True Color 分布</div><div class="v">${escapeHtml(colorSummary)}</div></div>
        <div class="stat"><div class="k">Label 分布</div><div class="v">${escapeHtml(labelSummary)}</div></div>
      `;
    }

    function fillSelect(select, values) {
      const current = select.value;
      select.innerHTML = '<option value="all">全部</option>';
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
      if (values.includes(current)) select.value = current;
    }

    function renderRows(rows) {
      currentRows = rows;
      const groups = groupRows(rows);
      groupsEl.innerHTML = '';

      groups.forEach((group) => {
        const imageSrc = buildImageSrc(group.image_path);
        const labelSummary = counter(group.records, 'label', 'unlabeled').map(([k, v]) => `${k}: ${v}`).join(' / ') || '-';
        const levelSummary = group.records.map((row) => derivePromptCode(row)).join(', ');
        const recordHtml = group.records.map((row) => {
          const label = String(row.label || '').trim() || 'unlabeled';
          const promptCode = escapeHtml(derivePromptCode(row) || '-');
          const confidence = escapeHtml(row.review_confidence || row.auto_label_confidence || '-');
          const sampleId = escapeHtml(row.sample_id || '');
          const prompt = escapeHtml(row.prompt_text || '');
          const rawOutput = escapeHtml(row.raw_output || row.model_output || '');
          const notes = escapeHtml(row.review_notes || row.notes || '-');
          const trueColor = escapeHtml(row.true_color || '-');
          const conflictColor = escapeHtml(row.conflict_color || '-');
          return `
            <section class="record" data-level="${escapeHtml(derivePromptCode(row) || '')}" data-label="${escapeHtml(label)}" data-color="${trueColor}">
              <div class="record-head">
                <div class="record-left">
                  <span class="badge level">${promptCode}</span>
                  ${labelBadge(label)}
                  <span class="sample-id">${sampleId}</span>
                </div>
                <div class="record-right">true: ${trueColor} | conflict: ${conflictColor} | confidence: ${confidence}</div>
              </div>
              <div class="record-grid">
                <div>
                  <div class="section-title">Prompt</div>
                  <div class="block prompt">${prompt}</div>
                </div>
                <div>
                  <div class="section-title">Raw Output</div>
                  <div class="block output">${rawOutput || '-'}</div>
                </div>
              </div>
              <div class="record-grid">
                <div>
                  <div class="section-title">Reviewed Color</div>
                  <div class="block notes">true_color: ${trueColor}\nconflict_color: ${conflictColor}</div>
                </div>
                <div>
                  <div class="section-title">Review Notes</div>
                  <div class="block notes">${notes}</div>
                </div>
              </div>
            </section>
          `;
        }).join('');

        const article = document.createElement('article');
        article.className = 'group-card';
        article.innerHTML = `
          <div class="group-top">
            <div class="thumb-wrap">
              ${imageSrc ? `<img class="thumb" src="${escapeHtml(imageSrc)}" alt="${escapeHtml(group.image_id || 'image')}" loading="lazy">` : '<div class="thumb-missing">图片路径缺失</div>'}
            </div>
            <div class="group-meta">
              <div class="group-title">image_id: ${escapeHtml(group.image_id)}</div>
              <div class="meta-line">reviewed true_color: ${escapeHtml(group.true_color || '-')}</div>
              <div class="meta-line">conflict_color: ${escapeHtml(group.conflict_color || '-')}</div>
              <div class="meta-line">review confidence: ${escapeHtml(group.review_confidence || '-')}</div>
              <div class="meta-line">records: ${group.records.length} | levels: ${escapeHtml(levelSummary)}</div>
              <div class="meta-line">group labels: ${escapeHtml(labelSummary)}</div>
              <div>
                <div class="section-title">Image Path</div>
                <div class="block notes">${escapeHtml(group.image_path || '-')}</div>
              </div>
            </div>
          </div>
          <div class="records-wrap">${recordHtml}</div>
        `;
        groupsEl.appendChild(article);
      });

      fillSelect(levelFilter, [...new Set(rows.map((r) => derivePromptCode(r)).filter(Boolean))].sort((a, b) => (LEVEL_RANK[a] ?? 999) - (LEVEL_RANK[b] ?? 999) || a.localeCompare(b, 'zh-CN')));
      fillSelect(labelFilter, [...new Set(rows.map((r) => String(r.label || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN')));
      fillSelect(colorFilter, [...new Set(rows.map((r) => String(r.true_color || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN')));
      applyFilters();
    }

    function applyFilters() {
      const selectedLevel = levelFilter.value;
      const selectedLabel = labelFilter.value;
      const selectedColor = colorFilter.value;
      const groups = Array.from(document.querySelectorAll('.group-card'));
      let visibleGroups = 0;
      let visibleRecords = 0;

      groups.forEach((group) => {
        const records = Array.from(group.querySelectorAll('.record'));
        let groupHasVisible = false;
        records.forEach((record) => {
          const levelOk = selectedLevel === 'all' || record.dataset.level === selectedLevel;
          const labelOk = selectedLabel === 'all' || record.dataset.label === selectedLabel;
          const colorOk = selectedColor === 'all' || record.dataset.color === selectedColor;
          const show = levelOk && labelOk && colorOk;
          record.classList.toggle('hidden', !show);
          if (show) {
            groupHasVisible = true;
            visibleRecords += 1;
          }
        });
        group.classList.toggle('hidden', !groupHasVisible);
        if (groupHasVisible) visibleGroups += 1;
      });
      visibleCount.textContent = `当前显示 ${visibleGroups} 个图片组 / ${visibleRecords} 条记录`;
    }

    async function loadFromText(text, sourceLabel) {
      const rows = parseCSV(text);
      if (!rows.length) throw new Error('CSV 没有可用记录');
      renderStats(rows, sourceLabel);
      renderRows(rows);
      statusBox.textContent = `已加载 ${sourceLabel} | ${rows.length} 条记录`;
    }

    async function loadFromFetch(path) {
      statusBox.textContent = `正在加载 ${path}`;
      const response = await fetch(path);
      if (!response.ok) throw new Error(`加载失败：${response.status} ${response.statusText}`);
      const text = await response.text();
      await loadFromText(text, path);
    }

    loadPresetBtn.addEventListener('click', async () => {
      const path = presetSelect.value;
      pathInput.value = path;
      try {
        await loadFromFetch(path);
      } catch (error) {
        statusBox.textContent = `预设加载失败：${error.message}。如果浏览器拦截本地 fetch，请改用“本地 CSV 文件”方式。`;
      }
    });

    loadPathBtn.addEventListener('click', async () => {
      const path = pathInput.value.trim();
      if (!path) return;
      try {
        await loadFromFetch(path);
      } catch (error) {
        statusBox.textContent = `路径加载失败：${error.message}。你也可以直接选择本地 CSV 文件。`;
      }
    });

    fileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      await loadFromText(text, file.name);
    });

    levelFilter.addEventListener('change', applyFilters);
    labelFilter.addEventListener('change', applyFilters);
    colorFilter.addEventListener('change', applyFilters);

    loadPresetBtn.click();
  </script>
</body>
</html>
