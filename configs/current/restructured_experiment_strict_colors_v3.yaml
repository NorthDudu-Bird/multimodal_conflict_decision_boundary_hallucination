dataset:
  raw_dir: data/raw/stanford_cars
  processed_dir: data/processed/stanford_cars
  clean_crops_dir: data/processed/stanford_cars/clean_crops
  clean_subset_manifest_csv: data/processed/stanford_cars/clean_subset_manifest.csv
  main_subset_csv: data/processed/stanford_cars/main_experiment_subset.csv
  final_manifest_csv: data/processed/stanford_cars/final_primary_manifest_v4_expanded.csv
  final_auxiliary_manifest_csv: data/processed/stanford_cars/final_auxiliary_manifest_v4_expanded.csv
  excluded_records_csv: data/processed/stanford_cars/excluded_records_v4_expanded.csv
  excluded_manual_review_csv: data/processed/stanford_cars/excluded_manual_review_v3.csv
  ambiguous_color_excluded_csv: data/processed/stanford_cars/excluded_due_to_ambiguous_colors_v4_expanded.csv
  color_distribution_csv: analysis/current/color_distribution_v4_expanded.csv
  color_distribution_md: analysis/current/color_distribution_v4_expanded.md
  candidate_pool_size: 1600
  clean_subset_size: 320
  main_subset_size: 120
  target_short_edge: 256
  num_workers: 8
  subset_name: stanford_cars_clean_main120_strict_colors
  dataset_name: stanford_cars_clean_strict_colors_v3
  experiment_type: car_color_prompt_mechanism_comparison_v3_expanded_strict_colors

annotation:
  dir: data/annotations/stanford_cars
  truth_mode: reviewed
  provisional_truth_csv: data/annotations/stanford_cars/provisional_truth.csv
  reviewed_truth_csv: data/annotations/stanford_cars/reviewed_truth.csv
  reviewed_truth_template_csv: data/annotations/stanford_cars/reviewed_truth_template.csv
  annotator_a_csv: data/annotations/stanford_cars/annotator_a.csv
  annotator_b_csv: data/annotations/stanford_cars/annotator_b.csv
  adjudication_template_csv: data/annotations/stanford_cars/adjudication_template.csv
  manual_exclusion_csv: data/annotations/stanford_cars/manual_exclusion_list.csv
  v2_dir: annotation/current/strict_colors_v3
  v2_provisional_truth_csv: annotation/current/strict_colors_v3/provisional_truth_current_v3.csv
  v2_reviewed_truth_csv: annotation/current/strict_colors_v3/reviewed_truth_current_v3.csv
  v2_adjudicated_truth_csv: annotation/current/strict_colors_v3/adjudicated_truth_v3.csv
  v2_annotator_a_csv: annotation/current/strict_colors_v3/annotator_a_v3.csv
  v2_annotator_b_csv: annotation/current/strict_colors_v3/annotator_b_v3.csv
  v2_adjudication_template_csv: annotation/current/strict_colors_v3/adjudication_template_v3.csv
  default_truth_source: reviewed

metadata:
  prompts_dir: data/metadata/strict_colors/prompts
  summaries_dir: data/metadata/strict_colors/summaries
  prepare_summary_basename: stanford_cars_v3_prepare_summary

prompts:
  dir: prompts/current
  v2_primary_csv: prompts/current/primary_prompts_v3.csv
  v2_auxiliary_csv: prompts/current/auxiliary_prompts_v3.csv
  v2_smoke_csv: prompts/current/smoke_prompts_v3.csv
  v2_primary_prompt_template_version: primary_conditions_v2_strict_colors
  v2_auxiliary_prompt_template_version: auxiliary_conditions_v2_strict_colors

outputs:
  smoke_dir: outputs/smoke_stanford_cars_restructured
  main_dir: outputs/main_stanford_cars_restructured
  auxiliary_dir: outputs/auxiliary_stanford_cars_restructured
  pilot_dir: outputs/pilot_nodog_preliminary
  v2_root_dir: outputs/current
  offload_dir: outputs/archived/_offload
  model_dir_templates:
    smoke: "{model_key}_smoke_v3"
    primary: "{model_key}_primary_v3"
    auxiliary: "{model_key}_auxiliary_v3"

legacy:
  archive_dir: archives/legacy_previous_design
  old_misc_dir: archives/old_misc

inference:
  model_dir: models/qwen2_vl_7b
  model_name: Qwen2-VL-7B-Instruct
  use_4bit: false
  batch_size: 1
  smoke_limit: 12
  max_new_tokens: 12
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  prompt_template_version: primary_conditions_v2_strict_colors
  precision_preference: auto

models:
  - model_key: qwen2vl7b
    model_type: qwen2_vl
    model_name: Qwen2-VL-7B-Instruct
    checkpoint_name: Qwen/Qwen2-VL-7B-Instruct
    local_dir: models/qwen2_vl_7b
    precision: auto
    batch_size: 1
    max_new_tokens: 8
  - model_key: llava15_7b
    model_type: llava
    model_name: LLaVA-1.5-7B
    checkpoint_name: llava-hf/llava-1.5-7b-hf
    local_dir: models/llava_1_5_7b_hf
    precision: float16
    batch_size: 1
    max_new_tokens: 8
  - model_key: internvl2_8b
    model_type: internvl2
    model_name: InternVL2-8B
    checkpoint_name: OpenGVLab/InternVL2-8B
    local_dir: models/internvl2_8b
    precision: bfloat16
    batch_size: 1
    max_new_tokens: 8
    max_num_tiles: 1

analysis:
  bootstrap_samples: 2000
  random_seed: 42
  rare_event_ci_method: beta
  v2_primary_dir: analysis/current/primary_v3
  v2_auxiliary_dir: analysis/current/auxiliary_v3
  v2_cross_model_dir: analysis/current/cross_model_v3

reports:
  viewer_mode: strict_colors_v3
  viewer_html: reports/current/strict_colors_multimodel_results_viewer_v3.html

color_policy:
  variant_name: strict_colors_v3_expanded
  primary_main_analysis_labels:
    - red
    - blue
    - green
    - yellow
    - black
    - white
  excluded_primary_labels:
    - silver
    - gray
    - other
  primary_output_labels:
    - red
    - blue
    - green
    - yellow
    - black
    - white
    - other
  recognized_nonstandard_labels:
    - gray
    - silver
  conflict_color_map:
    red: blue
    blue: red
    green: yellow
    yellow: red
    black: white
    white: black
    gray: red
    silver: blue
    other: red
  enforce_exact_faithful_match: true
  exclude_historical_issue_ids: false

expanded_selection:
  enabled: true
  base_manifest_csv: data/processed/stanford_cars/final_primary_manifest_strict_colors.csv
  manual_review_csv: data/processed/stanford_cars/expanded_manual_review_v3.csv
  current_reviewed_truth_csv: annotation/current/strict_colors/reviewed_truth_current.csv
  target_total_min: 150
  target_total_soft_floor: 140
  target_total_max: 200
  exclude_after_manual_review_ids:
    - test_01079
    - test_02823
    - test_04952
    - test_05175
    - test_06328
    - test_06708
    - test_06787
    - train_07422
    - train_04054
    - train_01346
