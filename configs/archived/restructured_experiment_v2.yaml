dataset:
  raw_dir: data/raw/stanford_cars
  processed_dir: data/processed/stanford_cars
  clean_crops_dir: data/processed/stanford_cars/clean_crops
  clean_subset_manifest_csv: data/processed/stanford_cars/clean_subset_manifest.csv
  main_subset_csv: data/processed/stanford_cars/main_experiment_subset.csv
  final_manifest_csv: data/processed/stanford_cars/final_analysis_manifest.csv
  excluded_records_csv: data/processed/stanford_cars/excluded_records.csv
  ambiguous_color_excluded_csv:
  candidate_pool_size: 1600
  clean_subset_size: 320
  main_subset_size: 120
  target_short_edge: 256
  num_workers: 8
  subset_name: stanford_cars_clean_main120
  dataset_name: stanford_cars_clean
  experiment_type: car_color_prompt_mechanism_comparison_v2

annotation:
  dir: data/annotations/stanford_cars
  truth_mode: provisional
  provisional_truth_csv: data/annotations/stanford_cars/provisional_truth.csv
  reviewed_truth_csv: data/annotations/stanford_cars/reviewed_truth.csv
  reviewed_truth_template_csv: data/annotations/stanford_cars/reviewed_truth_template.csv
  annotator_a_csv: data/annotations/stanford_cars/annotator_a.csv
  annotator_b_csv: data/annotations/stanford_cars/annotator_b.csv
  adjudication_template_csv: data/annotations/stanford_cars/adjudication_template.csv
  manual_exclusion_csv: data/annotations/stanford_cars/manual_exclusion_list.csv
  v2_dir: annotation
  v2_provisional_truth_csv: annotation/provisional_truth_current.csv
  v2_reviewed_truth_csv: annotation/reviewed_truth_current.csv
  v2_adjudicated_truth_csv: annotation/adjudicated_truth.csv
  v2_annotator_a_csv: annotation/annotator_a.csv
  v2_annotator_b_csv: annotation/annotator_b.csv
  v2_adjudication_template_csv: annotation/adjudication_template.csv
  default_truth_source: reviewed

metadata:
  prompts_dir: data/metadata/restructured/prompts
  summaries_dir: data/metadata/restructured/summaries

prompts:
  dir: prompts
  v2_primary_csv: prompts/v2_primary_prompts.csv
  v2_auxiliary_csv: prompts/v2_auxiliary_prompts.csv
  v2_smoke_csv: prompts/v2_smoke_prompts.csv
  v2_primary_prompt_template_version: primary_conditions_v2
  v2_auxiliary_prompt_template_version: auxiliary_conditions_v2

outputs:
  smoke_dir: outputs/smoke_stanford_cars_restructured
  main_dir: outputs/main_stanford_cars_restructured
  auxiliary_dir: outputs/auxiliary_stanford_cars_restructured
  pilot_dir: outputs/pilot_nodog_preliminary
  v2_root_dir: outputs
  offload_dir: outputs/_offload
  model_dir_templates:
    smoke: "{model_key}_v2_smoke"
    primary: "{model_key}_v2_primary"
    auxiliary: "{model_key}_v2_auxiliary"

legacy:
  archive_dir: archives/legacy_previous_design
  old_misc_dir: archives/old_misc

inference:
  model_dir: models/qwen2_vl_7b
  model_name: Qwen2-VL-7B-Instruct
  use_4bit: false
  batch_size: 1
  smoke_limit: 12
  max_new_tokens: 12
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  prompt_template_version: primary_conditions_v2
  precision_preference: auto

models:
  - model_key: qwen2vl7b
    model_type: qwen2_vl
    model_name: Qwen2-VL-7B-Instruct
    checkpoint_name: Qwen/Qwen2-VL-7B-Instruct
    local_dir: models/qwen2_vl_7b
    precision: auto
    batch_size: 1
    max_new_tokens: 8
  - model_key: llava15_7b
    model_type: llava
    model_name: LLaVA-1.5-7B
    checkpoint_name: llava-hf/llava-1.5-7b-hf
    local_dir: models/llava_1_5_7b_hf
    precision: float16
    batch_size: 1
    max_new_tokens: 8
  - model_key: internvl2_8b
    model_type: internvl2
    model_name: InternVL2-8B
    checkpoint_name: OpenGVLab/InternVL2-8B
    local_dir: models/internvl2_8b
    precision: bfloat16
    batch_size: 1
    max_new_tokens: 8
    max_num_tiles: 1

analysis:
  bootstrap_samples: 2000
  random_seed: 42
  rare_event_ci_method: beta
  v2_primary_dir: analysis/v2_primary
  v2_auxiliary_dir: analysis/v2_auxiliary
  v2_cross_model_dir: analysis/v2_cross_model

color_policy:
  variant_name: v2
  primary_main_analysis_labels:
    - white
    - black
    - gray
    - silver
    - red
    - blue
    - green
    - yellow
  excluded_primary_labels:
    - other
  primary_output_labels:
    - white
    - black
    - gray
    - silver
    - red
    - blue
    - green
    - yellow
    - other
  recognized_nonstandard_labels:
    - gray
    - silver
  conflict_color_map:
    white: black
    black: white
    gray: red
    silver: blue
    red: blue
    blue: red
    green: yellow
    yellow: red
    other: red
  enforce_exact_faithful_match: true
  exclude_historical_issue_ids: true
