   <g id="text_1">
    <text style="font-weight: 700; font-size: 12px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start" x="22.6008" y="26.413785" transform="rotate(-0 22.6008 26.413785)">Claim boundary at a glance</text>
   </g>
   <g id="text_2">
    <text style="font-size: 7.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start; fill: #696969" x="22.6008" y="37.909189" transform="rotate(-0 22.6008 37.909189)">A compact reader guide for keeping the result strong without overclaiming.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 7px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start; fill: #2e7d4f" x="37.23156" y="76.561829" transform="rotate(-0 37.23156 76.561829)">Supported</text>
   </g>
   <g id="text_4">
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; fill: #272727" transform="translate(37.23156 86.0013)">All models are faithful</text>
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; fill: #272727" transform="translate(37.23156 92.67888)">under C0; LLaVA shows</text>
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; fill: #272727" transform="translate(37.23156 99.4485)">C3/C4 paired shifts.</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 7px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle; fill: #ffffff" x="78.4287" y="59.658971" transform="rotate(-0 78.4287 59.658971)">OK</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 7px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: start; fill: #d99b2b" x="156.58776" y="76.476517" transform="rotate(-0 156.58776 76.476517)">Bounded</text>
   </g>
   <g id="text_7">
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; fill: #272727" transform="translate(156.58776 86.0793)">The shift changes with</text>
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; fill: #272727" transform="translate(156.58776 92.92392)">wording, format, prompt</text>
