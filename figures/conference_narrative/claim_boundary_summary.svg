   </g>
   <g id="text_10">
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; fill: #272727" transform="translate(275.94396 86.0013)">The evidence does not</text>
