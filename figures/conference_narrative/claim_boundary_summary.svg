   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 7px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle; fill: #ffffff" x="197.7849" y="59.658971" transform="rotate(-0 197.7849 59.658971)">IF</text>
   </g>
   <g id="text_9">
